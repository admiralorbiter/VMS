purpose_key: teacher_session_reminder
name: Teacher Session Reminder
description: Reminder for teachers to sign up for virtual career sessions with upcoming session links
subject: "Action Needed: Sign Up for a Virtual Career Session — {{district_name}}"

required_placeholders:
  - teacher_name
  - district_name
  - session_list
  - session_list_text
  - login_url

optional_placeholders:
  - building_name
  - contact_email

html: |
  <!DOCTYPE html>
  <html>
  <head>
      <meta charset="utf-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
  </head>
  <body style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif; line-height: 1.6; color: #333; max-width: 640px; margin: 0 auto; padding: 20px; background-color: #f5f5f5;">

      <!-- Header -->
      <div style="background: linear-gradient(135deg, #003366 0%, #004080 60%, #c8a415 100%); padding: 35px 30px; border-radius: 12px 12px 0 0; text-align: center;">
          <h1 style="color: white; margin: 0; font-size: 22px; font-weight: 700; letter-spacing: 0.5px;">Virtual Career Sessions</h1>
          <p style="color: rgba(255,255,255,0.85); margin: 8px 0 0 0; font-size: 14px;">{{district_name}}</p>
      </div>

      <!-- Body -->
      <div style="background: #ffffff; padding: 30px; border: 1px solid #e0e0e0; border-top: none;">

          <!-- Greeting -->
          <p style="font-size: 16px; margin: 0 0 20px 0;">
              Hi <strong>{{teacher_name}}</strong>,
          </p>

          <p style="margin: 0 0 20px 0; color: #555;">
              We still need you to sign up for a virtual career session this year! These sessions connect your students with working professionals for an engaging, real-world experience — and they only take about 45 minutes.
          </p>

          <!-- CTA Box -->
          <div style="background: linear-gradient(135deg, #e8f0fe 0%, #f0f4f8 100%); padding: 20px; border-radius: 8px; margin-bottom: 25px; text-align: center; border: 1px solid #d0dbe8;">
              <p style="margin: 0 0 12px 0; font-size: 16px; color: #003366; font-weight: 600;">
                  👇 Pick a session below and sign up on Pathful
              </p>
              <p style="margin: 0; font-size: 13px; color: #666;">
                  Choose one that works for your schedule. Each session is virtual and lasts about 45 minutes.
              </p>
          </div>

          <!-- Sessions Table -->
          <h2 style="margin: 0 0 15px 0; font-size: 17px; color: #003366;">Upcoming Sessions</h2>

          <div style="overflow-x: auto;">
              {{session_list}}
          </div>

          <!-- Login Link -->
          <div style="margin-top: 25px; padding: 16px 20px; background: #f8f9fa; border-radius: 8px; border: 1px solid #e9ecef;">
              <p style="margin: 0 0 8px 0; font-size: 14px; color: #333; font-weight: 600;">
                  🔗 Already signed up or want to check your status?
              </p>
              <p style="margin: 0; font-size: 14px;">
                  <a href="{{login_url}}" style="color: #004080; text-decoration: underline;">Log in to the VMS portal</a> to view your sessions and progress.
              </p>
          </div>

          <!-- Correction Note -->
          <div style="margin-top: 20px; padding: 16px 20px; background: #fff9e6; border-radius: 8px; border: 1px solid #f0e4b8;">
              <p style="margin: 0; font-size: 13px; color: #665a20;">
                  <strong>Think this is a mistake?</strong> If you've already completed a session or believe you received this in error, please reply to this email or contact <a href="mailto:{{contact_email}}" style="color: #665a20;">{{contact_email}}</a> and we'll get it sorted out.
              </p>
          </div>

      </div>

      <!-- Footer -->
      <div style="background: #003366; padding: 20px; border-radius: 0 0 12px 12px; text-align: center;">
          <p style="margin: 0; font-size: 12px; color: rgba(255,255,255,0.7);">
              {{district_name}} &middot; Virtual Career Sessions Program
          </p>
          <p style="margin: 6px 0 0 0; font-size: 11px; color: rgba(255,255,255,0.5);">
              This is an automated reminder from the VMS system.
          </p>
      </div>

  </body>
  </html>

text: |
  Action Needed: Sign Up for a Virtual Career Session
  ====================================================
  {{district_name}}

  Hi {{teacher_name}},

  We still need you to sign up for a virtual career session this year!
  These sessions connect your students with working professionals for an
  engaging, real-world experience — and they only take about 45 minutes.

  Pick a session below and sign up on Pathful:

  Upcoming Sessions
  -----------------
  {{session_list_text}}

  Already signed up or want to check your status?
  Log in to the VMS portal: {{login_url}}

  Think this is a mistake?
  If you've already completed a session or believe you received this in
  error, please reply to this email or contact {{contact_email}}.

  ---
  {{district_name}} - Virtual Career Sessions Program
  This is an automated reminder from the VMS system.
